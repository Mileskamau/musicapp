name: musiq
description: "A premium music player app with modern dark theme and smooth animations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Audio playback
  just_audio: ^0.10.5
  
  # Local music library
  on_audio_query: ^2.9.0
  permission_handler: ^11.1.0
  
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # UI/Animations
  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.6.0
  
  # Utils
  path_provider: ^2.1.1
  uuid: ^4.2.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  share_plus: ^7.2.1
  
  # Image handling
  image_picker: ^1.0.7
  palette_generator: ^0.3.3+4
  
  # Network for lyrics
  http: ^1.2.0
  
  # File picker for backup/restore
  file_picker: ^8.0.0+1
  
  # Sensors for particle effect
  sensors_plus: ^4.0.2
  
  # Image processing for blur
  image: ^4.1.7

  # Crypto for backup checksums
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
